<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINKS MARCO ZAGARA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="linktree-stage">
      <div class="linktree">
        <h1 class="title scramble-text" data-fit-max="3.16" data-fit-min="1.8">MARCO ZAGARA</h1>
        <p class="subtitle scramble-text" data-fit-max="1.14" data-fit-min="0.72">
          DIGITAL ARTIST // VISUAL STORYTELLER
        </p>
        <img class="about-photo" src="images/about-photo-cmp.jpg" alt="About photo" />
        <div class="social-icons">
          <span class="icon-divider" aria-hidden="true"></span>
          <a href="mailto:marcozagara17@gmail.com" aria-label="Email" target="_blank" rel="noreferrer">
            <img class="social-icon" src="images/email.svg" alt="Email" />
          </a>
          <a
            href="https://instagram.com/marcozagara"
            aria-label="Instagram"
            target="_blank"
            rel="noreferrer"
          >
            <img class="social-icon" src="images/instagram.svg" alt="Instagram" />
          </a>
          <a href="https://x.com/marcozagara" aria-label="X" target="_blank" rel="noreferrer">
            <img class="social-icon" src="images/x.svg" alt="X" />
          </a>
          <span class="icon-divider" aria-hidden="true"></span>
        </div>
        <a class="link-button" href="https://marcozagara.com" target="_blank" rel="noreferrer">WEBSITE</a>
        <a
          class="link-button"
          href="https://displate.com/artist/marcozagara?art=5eda8d5497c77"
          target="_blank"
          rel="noreferrer"
        >
          METAL PRINTS
        </a>
        <a class="link-button" href="https://patreon.com/marcozagara" target="_blank" rel="noreferrer">
          PATREON
        </a>
        <p class="contact-copy" data-fit-lines-max="0.95" data-fit-lines-min="0.56">
          <span class="contact-copy__line">Feel free to get in touch with me to discuss new</span>
          <span class="contact-copy__line">projects or opportunities to be part of your vision.</span>
        </p>
        <a class="link-button link-button--contact" href="mailto:marcozagara17@gmail.com">CONTACT ME</a>
        <p class="copyright-copy" data-fit-max="0.9" data-fit-min="0.42">
          Copyright &copy; 2006 Marco Zagara. All rights reserved.
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
